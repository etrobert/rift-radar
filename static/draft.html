<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rift Radar - Draft</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="champion-selector.css" />
    <link rel="stylesheet" href="suggestions.css" />
    <link rel="stylesheet" href="damage-composition.css" />
  </head>
  <body>
    <nav class="nav-bar">
      <h1>Rift Radar</h1>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Stats</a>
        <a href="draft.html" class="nav-link active">Draft</a>
      </div>
    </nav>


    <div class="draft-layout">
      <div class="left-team">
        <div class="team-container">
          <h3>Ally Bans</h3>
          <div class="team-champions" data-team="ally" data-type="bans"></div>
        </div>
        <div class="team-container">
          <h3>Ally Team</h3>
          <div class="team-champions" data-team="ally"></div>
          <div class="team-damage-composition" id="ally-damage-composition">
            <div class="team-combined-damage-bar empty-bar"></div>
          </div>
        </div>
      </div>

      <div class="center-suggestions">
        <div class="suggestions-panel">
          <h3>Pick Suggestions</h3>
          <div id="suggestions-content">
            <p>Select enemy champions to see counter-pick suggestions</p>
          </div>
        </div>
      </div>

      <div class="right-team">
        <div class="team-container">
          <h3>Enemy Bans</h3>
          <div class="team-champions" data-team="enemy" data-type="bans"></div>
        </div>
        <div class="team-container">
          <h3>Enemy Team</h3>
          <div class="team-champions" data-team="enemy"></div>
          <div class="team-damage-composition" id="enemy-damage-composition">
            <div class="team-combined-damage-bar empty-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="champion-modal" id="championModal">
      <div class="champion-modal-content">
        <div class="champion-modal-header">
          <input
            type="text"
            id="championSearch"
            placeholder="Search champions..."
            class="champion-search"
          />
          <button class="champion-modal-close" id="closeModal">&times;</button>
        </div>
        <div class="champion-grid" id="championGrid"></div>
      </div>
    </div>

    <script src="url-utils.js"></script>
    <script type="module" src="champion-selector.js"></script>
  </body>
</html>
