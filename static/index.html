<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rift Radar</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="nav-bar">
      <h1>Rift Radar</h1>
      <div class="nav-links">
        <a href="index.html" class="nav-link active">Stats</a>
        <a href="draft.html" class="nav-link">Draft</a>
      </div>
    </nav>

    <form onsubmit="getAllStats(event)">
      <div>
        <label>Game Name:</label>
        <input type="text" id="gameName" placeholder="e.g. titius33" required />
      </div>

      <div>
        <label>Tag Line:</label>
        <input type="text" id="tagLine" placeholder="e.g. EUW" required />
      </div>

      <div>
        <label>Queue Type:</label>
        <select id="queueType">
          <option value="-1">All Queues</option>
          <option value="420">Ranked Solo/Duo</option>
          <option value="440">Ranked Flex 5v5</option>
          <option value="400">Normal Draft</option>
          <option value="430">Normal Blind</option>
          <option value="450">ARAM</option>
        </select>
      </div>

      <div>
        <label>Number of Games:</label>
        <input type="number" id="games" min="1" max="1000" value="100" />
      </div>

      <button type="submit">Get Stats</button>
    </form>

    <div id="results"></div>

    <script src="url-utils.js"></script>
    <script src="script.js"></script>
  </body>
</html>
